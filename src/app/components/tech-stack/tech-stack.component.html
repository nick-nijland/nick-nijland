<section id="stack">
  <div class="container">
    <p class="section-label">
      <span class="comment">// </span><span class="name">{{ 'stack.label' | translate }}</span>
    </p>

    <div class="grid">
      @for (category of categories; track category.name) {
        <div class="category">
          <h3 class="cat-name">{{ category.name | translate }}</h3>
          <ul class="skills">
            @for (skill of category.skills; track skill) {
              <li class="skill">{{ skill }}</li>
            }
          </ul>
        </div>
      }
    </div>
  </div>
</section>
